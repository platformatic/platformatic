packages:
  # all packages in direct subdirs of packages/
  - 'packages/*'
allowBuilds:
  '@datadog/pprof': true
  '@fastify/pre-commit': true
  '@nestjs/core': true
  better-sqlite3: true
  esbuild: true
  msgpackr-extract: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
autoInstallPeers: true
childConcurrency: 1
hoist: false
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@platformatic/*'
  # Renovate security update: protobufjs@8.0.1 || 8.6.0
  - protobufjs@8.0.1 || 8.6.0
  # Renovate security update: fast-uri@3.1.2
  - fast-uri@3.1.2
  # Renovate security update: next@16.2.5 || 16.2.6
  - next@16.2.5 || 16.2.6
nodeLinker: hoisted
packageImportMethod: copy
preferSymlinkedExecutables: true
resolutionMode: highest
strictPeerDependencies: false
